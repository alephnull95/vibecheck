version: "3.9"

# ── Shared app environment ────────────────────────────────────────────────────
# All ${VAR} values are supplied via Portainer's "Environment variables" UI.
# See .env.example for the full list of required variables.
# ── Minimum required in Portainer: SECRET_KEY, DATABASE_URL, POSTGRES_* ─────
# Everything else (API keys, service URLs) can be set via the /setup UI and
# will be persisted on the vibecheck_config volume at /config/settings.env.
# If you prefer to supply ALL values via Portainer, you can do so — env vars
# always take priority over the config file.
x-app-env: &app-env
  SECRET_KEY: ${SECRET_KEY}
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
  CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
  CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
  # Optional overrides – leave blank to configure via /ui/setup.html instead
  APP_ENV: ${APP_ENV:-}
  LOG_LEVEL: ${LOG_LEVEL:-}
  RADARR_URL: ${RADARR_URL:-}
  RADARR_API_KEY: ${RADARR_API_KEY:-}
  PLEX_URL: ${PLEX_URL:-}
  PLEX_TOKEN: ${PLEX_TOKEN:-}
  TMDB_API_KEY: ${TMDB_API_KEY:-}
  TMDB_ACCESS_TOKEN: ${TMDB_ACCESS_TOKEN:-}
  LLM_PROVIDER: ${LLM_PROVIDER:-}
  OPENAI_API_KEY: ${OPENAI_API_KEY:-}
  GEMINI_API_KEY: ${GEMINI_API_KEY:-}
  OVERSEERR_URL: ${OVERSEERR_URL:-}
  OVERSEERR_API_KEY: ${OVERSEERR_API_KEY:-}

services:
  # ──────────────────────────────────────────────
  # PostgreSQL + pgvector
  # ──────────────────────────────────────────────
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    container_name: vibecheck-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Redis (Celery broker + result backend)
  # ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: vibecheck-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # FastAPI application
  # ──────────────────────────────────────────────
  api:
    build: .
    container_name: vibecheck-api
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      <<: *app-env
    volumes:
      - vibecheck_config:/config
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Celery worker (ingestion / AI profiling)
  # ──────────────────────────────────────────────
  worker:
    build: .
    container_name: vibecheck-worker
    restart: unless-stopped
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=4 -Q default,ingestion
    environment:
      <<: *app-env
    volumes:
      - vibecheck_config:/config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Celery Beat – scheduled task dispatcher
  # Runs nightly Radarr sync (3 AM UTC) and
  # Plex collection refresh (4 AM UTC).
  # ──────────────────────────────────────────────
  celery-beat:
    build: .
    container_name: vibecheck-beat
    restart: unless-stopped
    command: celery -A app.workers.celery_app beat --loglevel=info --schedule=/tmp/celerybeat-schedule
    environment:
      <<: *app-env
    volumes:
      - vibecheck_config:/config
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ──────────────────────────────────────────────
  # Flower – Celery monitoring UI  (optional)
  # ──────────────────────────────────────────────
  flower:
    build: .
    container_name: vibecheck-flower
    restart: unless-stopped
    command: celery -A app.workers.celery_app flower --port=5555
    environment:
      <<: *app-env
    volumes:
      - vibecheck_config:/config
    ports:
      - "5555:5555"
    depends_on:
      - redis
      - worker

  # ──────────────────────────────────────────────
  # Bootstrap – runs once to trigger initial sync
  # Waits for the API to be ready, then fires
  # POST /api/v1/sync/radarr and exits.
  # Remove this service after the first run if
  # you don't want it to re-trigger on restarts.
  # ──────────────────────────────────────────────
  bootstrap:
    image: curlimages/curl:8.7.1
    container_name: vibecheck-bootstrap
    restart: "no"
    entrypoint: >
      sh -c "
        echo 'Waiting for VibeCheck API…';
        until curl -sf http://api:8000/health > /dev/null; do
          echo '  API not ready, retrying in 5s…';
          sleep 5;
        done;
        echo 'API is up. Triggering initial Radarr sync…';
        RESULT=$$(curl -sf -X POST http://api:8000/api/v1/sync/radarr);
        echo \"Sync enqueued: $$RESULT\";
        echo 'Bootstrap complete. Monitor progress at http://localhost:5555';
      "
    depends_on:
      - api
      - worker

volumes:
  postgres_data:
  vibecheck_config:  # Persists /config/settings.env written by the setup UI
